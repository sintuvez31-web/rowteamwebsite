<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RowTeam | Giriş</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. GİRİŞ EKRANI */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
            border: 1px solid #262626;
            padding: 40px;
            width: 350px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .login-container h1 {
            font-size: 36px;
            margin-bottom: 30px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-input {
            width: 100%;
            background: #121212;
            border: 1px solid #262626;
            padding: 14px;
            border-radius: 6px;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            border-color: #555;
        }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        /* 2. CHAT PANELİ */
        .main-container {
            display: none;
            width: 100%;
            height: 100vh;
            background-color: #000;
        }

        .chat-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #262626;
            height: 100%;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #262626;
            background-color: #000;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #000;
        }

        /* Mesaj Balonları */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 75%;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .message.outgoing {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 12px;
            color: #a8a8a8;
            margin-bottom: 4px;
            margin-left: 2px;
        }

        .message.outgoing .username {
            text-align: right;
            margin-right: 2px;
        }

            border
