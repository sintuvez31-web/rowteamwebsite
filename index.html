<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RowTeam | Giriş</title>
    <!-- Socket.IO Kütüphanesi -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. GİRİŞ EKRANI */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
            border: 1px solid #262626;
            padding: 40px;
            width: 350px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .login-container h1 {
            font-size: 36px;
            margin-bottom: 30px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-input {
            width: 100%;
            background: #121212;
            border: 1px solid #262626;
            padding: 14px;
            border-radius: 6px;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            border-color: #555;
        }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        /* 2. CHAT PANELİ */
        .main-container {
            display: none;
            width: 100%;
            height: 100vh;
            background-color: #000;
        }

        .chat-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #262626;
            height: 100%;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #262626;
            background-color: #000;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #000;
        }

        /* Mesaj Balonları */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 75%;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .message.outgoing {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 12px;
            color: #a8a8a8;
            margin-bottom: 4px;
            margin-left: 2px;
        }

        .message.outgoing .username {
            text-align: right;
            margin-right: 2px;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            word-break: break-word;
            line-height: 1.4;
        }

        .incoming .bubble {
            background-color: #262626;
            color: #fff;
        }

        .outgoing .bubble {
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            color: #fff;
        }

        /* Yazma Alanı */
        .chat-input-area {
            padding: 20px;
            background-color: #000;
            border-top: 1px solid #262626;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: #000;
            border: 1px solid #262626;
            border-radius: 24px;
            padding: 8px 20px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            outline: none;
            padding: 8px 0;
        }

        .input-wrapper button {
            background: none;
            border: none;
            color: #0095f6;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            padding-left: 15px;
        }

        /* SAĞ PANEL: DISCORD STYLE ÜYELER */
        .members-section {
            flex: 1;
            min-width: 260px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .members-header {
            padding: 20px;
            border-bottom: 1px solid #262626;
            font-size: 16px;
            font-weight: 600;
        }

        .members-list {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Rol Başlıkları */
        .role-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: #8e9297;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0.35;
            transition: opacity 0.2s;
        }

        .member-item.online {
            opacity: 1;
        }

        .member-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #262626;
            border: 1px solid #333;
            object-fit: cover;
        }

        .avatar-wrapper {
            position: relative;
        }

        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #747f8d;
            border: 2px solid #000;
        }

        .member-item.online .status-dot {
            background-color: #3ba55d;
        }

        .member-info {
            display: flex;
            flex-direction: column;
        }

        .member-name {
            font-size: 14px;
            font-weight: 600;
        }

        .owner-style { color: #ed4245 !important; }
        .dev-style { color: #0095f6 !important; }
        .online-style { color: #fff !important; }

        .member-status-text {
            font-size: 11px;
            color: #a8a8a8;
        }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div class="login-container" id="loginScreen">
        <h1>RowTeam</h1>
        <input type="text" class="login-input" id="igUsernameInput" placeholder="Kullanıcı adınızı yazın...">
        <button class="login-btn" onclick="loginToChat()">Giriş Yap</button>
    </div>

    <!-- CHAT PANELİ -->
    <div class="main-container" id="chatScreen">
        
        <div class="chat-section">
            <div class="chat-header">
                <h2>RowTeam 💬</h2>
            </div>
            
            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz...">
                    <button onclick="sendMessage()">Gönder</button>
                </div>
            </div>
        </div>

        <!-- SAĞ PANEL -->
        <div class="members-section">
            <div class="members-header">Üyeler</div>
            <div class="members-list" id="membersList">
                
                <!-- OWNER (ESAT KORKMAZ) -->
                <div id="ownerGroup">
                    <div class="role-title" id="ownerTitle">Owner — 0</div>
                    <div class="member-item" id="ownerItem">
                        <div class="avatar-wrapper">
                            <img src="owner.png" class="member-avatar" id="ownerAvatarImg">
                            <div class="status-dot"></div>
                        </div>
                        <div class="member-info">
                            <span class="member-name owner-style" id="ownerNameSpan">ESAT KORKMAZ</span>
                            <span class="member-status-text" id="ownerStatusText">Çevrimdışı</span>
                        </div>
                    </div>
                </div>

                <!-- DEVELOPER (SİNTUV) -->
                <div id="devGroup">
                    <div class="role-title" id="devTitle">Developer — 0</div>
                    <div class="member-item" id="devItem">
                        <div class="avatar-wrapper">
                            <img src="dev.png" class="member-avatar" id="devAvatarImg">
                            <div class="status-dot"></div>
                        </div>
                        <div class="member-info">
                            <span class="member-name dev-style" id="devNameSpan">SİNTUV</span>
                            <span class="member-status-text" id="devStatusText">Çevrimdışı</span>
                        </div>
                    </div>
                </div>

                <!-- AKTİF ÜYELER -->
                <div>
                    <div class="role-title" id="activeTitle">Aktif Üyeler — 0</div>
                    <div id="dynamicNormalUsers"></div>
                </div>

            </div>
        </div>

    </div>

    <script>
        let currentUser = "@anonim";
        let socket = null;

        window.onload = function() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('chatScreen').style.display = 'none';
        };

        function loginToChat() {
            let inputName = document.getElementById('igUsernameInput').value.trim();
            
            if (inputName !== "") {
                currentUser = inputName;

                if(currentUser.toUpperCase() === "ESAT KORKMAZ") {
                    document.getElementById('ownerNameSpan').innerText = "ESAT KORKMAZ (Sen)";
                }
                if(currentUser.toUpperCase() === "SİNTUV" || currentUser.toUpperCase() === "SINTUV") {
                    document.getElementById('devNameSpan').innerText = "SİNTUV (Sen)";
                }

                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'flex';
                document.title = "RowTeam | Chat";

                initSocket();
            } else {
                alert("Lütfen geçerli bir kullanıcı adı girin!");
            }
        }

        function initSocket() {
            socket = io("https://rowteamwebsite-2.onrender.com", {
                transports: ['websocket', 'polling']
            }); 

            socket.on('connect', () => {
                socket.emit('join', { user: currentUser });
            });

            socket.on('history', function(messages) {
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = ''; 
                messages.forEach(data => {
                    if (data.user === currentUser) {
                        showLocalMessage(data.msg);
                    } else {
                        showIncomingMessage(data.user, data.msg);
                    }
                });
            });

            socket.on('message', function(data) {
                if (data.user !== currentUser) {
                    showIncomingMessage(data.user, data.msg);
                }
            });

            socket.on('user_list', function(onlineUsers) {
                const onlineClean = onlineUsers.map(u => u.toUpperCase().replace('@','').trim());

                const isOwnerOnline = onlineClean.includes("ESAT KORKMAZ") || onlineClean.includes("ESATKORKMAZ");
                const ownerItem = document.getElementById('ownerItem');
                if (isOwnerOnline) {
                    ownerItem.classList.add('online');
                    document.getElementById('ownerStatusText').innerText = 'Çevrimiçi';
                    document.getElementById('ownerTitle').innerText = 'Owner — 1';
                } else {
                    ownerItem.classList.remove('online');
                    document.getElementById('ownerStatusText').innerText = 'Çevrimdışı';
                    document.getElementById('ownerTitle').innerText = 'Owner — 0';
                }

                const isDevOnline = onlineClean.includes("SİNTUV") || onlineClean.includes("SINTUV");
                const devItem = document.getElementById('devItem');
                if (isDevOnline) {
                    devItem.classList.add('online');
                    document.getElementById('devStatusText').innerText = 'Çevrimiçi';
                    document.getElementById('devTitle').innerText = 'Developer — 1';
                } else {
                    devItem.classList.remove('online');
                    document.getElementById('devStatusText').innerText = 'Çevrimdışı';
                    document.getElementById('devTitle').innerText = 'Developer — 0';
                }

                const dynamicArea = document.getElementById('dynamicNormalUsers');
                dynamicArea.innerHTML = ''; 

                const normalUsers = onlineUsers.filter(u => {
                    const up = u.toUpperCase().replace('@','').trim();
                    return up !== "ESAT KORKMAZ" && up !== "ESATKORKMAZ" && up !== "SİNTUV" && up !== "SINTUV";
                });

                document.getElementById('activeTitle').innerText = `Aktif Üyeler — ${normalUsers.length}`;

                normalUsers.forEach(user => {
                    const isMe = (user === currentUser);
                    const displayName = isMe ? `${user} (Sen)` : user;

                    const userRow = document.createElement('div');
                    userRow.className = 'member-item online';
                    userRow.style.marginBottom = '15px';
                    userRow.innerHTML = `
                        <div class="avatar-wrapper">
                            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${user}" class="member-avatar">
                            <div class="status-dot"></div>
                        </div>
                        <div class="member-info">
                            <span class="member-name online-style">${displayName}</span>
                            <span class="member-status-text">Çevrimiçi</span>
                        </div>
                    `;
                    dynamicArea.appendChild(userRow);
                });
            });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const messageText = input.value.trim();
            
            if (messageText !== "" && socket) {
                socket.send({ user: currentUser, msg: messageText });
                showLocalMessage(messageText);
                input.value = "";
            }
        }

        function showLocalMessage(msg) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message outgoing';
            messageDiv.innerHTML = `
                <div class="msg-content">
                    <span class="username">${currentUser}</span>
                    <div class="bubble">${msg}</div>
                </div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showIncomingMessage(user, msg) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message incoming';
            messageDiv.innerHTML = `
                <div class="msg-content">
                    <span class="username">${user}</span>
                    <div class="bubble">${msg}</div>
                </div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { sendMessage(); }
        });
        document.getElementById('igUsernameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { loginToChat(); }
        });
    </script>
</body>
</html>
