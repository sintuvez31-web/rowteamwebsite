<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grup Chat | Instagram DM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Ana Panel */
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            background-color: #000;
            border: 1px solid #262626;
        }

        /* SOL / ORTA: CHAT ALANI */
        .chat-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #262626;
            height: 100%;
        }

        /* Üst Bar (Grup Adı) */
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #262626;
            display: flex;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        /* Mesajların Listelendiği Yer */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Mesaj Yapısı */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 70%;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .message.outgoing {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #333;
            object-fit: cover;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 12px;
            color: #a8a8a8;
            margin-bottom: 4px;
            margin-left: 2px;
        }

        .message.outgoing .username {
            text-align: right;
            margin-right: 2px;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            word-break: break-word;
        }

        .incoming .bubble {
            background-color: #262626;
            color: #fff;
        }

        .outgoing .bubble {
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            color: #fff;
        }

        /* Mesaj Yazma Alanı */
        .chat-input-area {
            padding: 20px;
            background-color: #000;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: #000;
            border: 1px solid #262626;
            border-radius: 24px;
            padding: 8px 16px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            outline: none;
            padding: 6px 0;
        }

        .input-wrapper button {
            background: none;
            border: none;
            color: #0095f6;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            padding-left: 10px;
        }

        .input-wrapper button:hover {
            color: #fff;
        }

        /* SAĞ TARAF: ÜYELER LİSTESİ */
        .members-section {
            flex: 1;
            min-width: 250px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .members-header {
            padding: 15px 20px;
            border-bottom: 1px solid #262626;
            font-size: 16px;
            font-weight: 600;
        }

        .members-list {
            padding: 15px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #333;
            object-fit: cover;
            border: 1px solid #262626;
        }

        .member-info {
            display: flex;
            flex-direction: column;
        }

        .member-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .member-ig {
            font-size: 12px;
            color: #a8a8a8;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ORTA: CHAT BÖLÜMÜ -->
        <div class="chat-section">
            <div class="chat-header">
                <h2>Row Team Instagram Grubu 💬</h2>
            </div>
            
            <!-- Mesaj Alanı -->
            <div class="chat-messages" id="chatMessages">
                
                <!-- Örnek Gelen Mesaj -->
                <div class="message incoming">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Ahmet" class="msg-avatar" alt="avatar">
                    <div class="msg-content">
                        <span class="username">@ahmet_arslan</span>
                        <div class="bubble">Selam beyler, akşam r0w team maçı var mı?</div>
                    </div>
                </div>

                <!-- Örnek Giden Mesaj -->
                <div class="message outgoing">
                    <div class="msg-content">
                        <span class="username">@senin_adin</span>
                        <div class="bubble">Aynen kanka, 20:00 gibi herkesi Discord'a bekliyorum.</div>
                    </div>
                </div>

            </div>

            <!-- Mesaj Gönderme Girdisi -->
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz...">
                    <button onclick="sendMessage()">Gönder</button>
                </div>
            </div>
        </div>

        <!-- SAĞ: ÜYELER BÖLÜMÜ -->
        <div class="members-section">
            <div class="members-header">Üyeler (4)</div>
            <div class="members-list">
                
                <!-- Üye 1 -->
                <div class="member-item">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Ahmet" class="member-avatar" alt="profil">
                    <div class="member-info">
                        <span class="member-name">Ahmet Arslan</span>
                        <span class="member-ig">@ahmet_arslan</span>
                    </div>
                </div>

                <!-- Üye 2 -->
                <div class="member-item">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Ece" class="member-avatar" alt="profil">
                    <div class="member-info">
                        <span class="member-name">Ece Yılmaz</span>
                        <span class="member-ig">@ece_ylmzz</span>
                    </div>
                </div>

                <!-- Üye 3 -->
                <div class="member-item">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Kaan" class="member-avatar" alt="profil">
                    <div class="member-info">
                        <span class="member-name">Kaan Demir</span>
                        <span class="member-ig">@kaandmr_</span>
                    </div>
                </div>

                <!-- Üye 4 (Sen) -->
                <div class="member-item">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Sen" class="member-avatar" alt="profil">
                    <div class="member-info">
                        <span class="member-name">Sen</span>
                        <span class="member-ig">@senin_adin</span>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Mesaj Gönderme Mekanizması -->
    <script>
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const messageText = input.value.trim();
            
            if (messageText !== "") {
                const chatMessages = document.getElementById('chatMessages');
                
                // Yeni mesaj elementi oluştur
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message outgoing';
                
                messageDiv.innerHTML = `
                    <div class="msg-content">
                        <span class="username">@senin_adin</span>
                        <div class="bubble">${messageText}</div>
                    </div>
                `;
                
                chatMessages.appendChild(messageDiv);
                input.value = ""; // Kutuyu temizle
                chatMessages.scrollTop = chatMessages.scrollHeight; // Ekranı aşağı kaydır
            }
        }

        // Enter tuşuna basınca da göndersin
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
