<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RowTeam | Giriş Yap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* LOGIN EKRANI */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
            border: 1px solid #262626;
            padding: 40px;
            width: 350px;
            border-radius: 4px;
        }

        .login-container h1 {
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 700;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-input {
            width: 100%;
            background: #121212;
            border: 1px solid #262626;
            padding: 12px;
            border-radius: 4px;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
            font-size: 14px;
        }

        .login-input:focus {
            border-color: #a8a8a8;
        }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        /* CHAT PANELİ (İLK BAŞTA GİZLİ) */
        .main-container {
            display: none;
            width: 100%;
            height: 100vh;
            background-color: #000;
        }

        .chat-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #262626;
            height: 100%;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #262626;
            display: flex;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
