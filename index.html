<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RowTeam | Giriş Yap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* LÖGİN EKRANI */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
            border: 1px solid #262626;
            padding: 40px;
            width: 350px;
            border-radius: 4px;
        }

        .login-container h1 {
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 700;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-input {
            width: 100%;
            background: #121212;
            border: 1px solid #262626;
            padding: 12px;
            border-radius: 4px;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
            font-size: 14px;
        }

        .login-input:focus {
            border-color: #a8a8a8;
        }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        /* CHAT PANELİ (İLK BAŞTA GİZLİ) */
        .main-container {
            display: none; /* Giriş yapılınca 'flex' olacak */
            width: 100%;
            height: 100vh;
            background-color: #000;
        }

        .chat-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #262626;
            height: 100%;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #262626;
            display: flex;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Mesaj Tasarımları */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 70%;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .message.outgoing {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #333;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 12px;
            color: #a8a8a8;
            margin-bottom: 4px;
            margin-left: 2px;
        }

        .message.outgoing .username {
            text-align: right;
            margin-right: 2px;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            word-break: break-word;
        }

        .incoming .bubble {
            background-color: #262626;
            color: #fff;
        }

        .outgoing .bubble {
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            color: #fff;
        }

        /* Mesaj Yazma Kutusu */
        .chat-input-area {
            padding: 20px;
            background-color: #000;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: #000;
            border: 1px solid #262626;
            border-radius: 24px;
            padding: 8px 16px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            outline: none;
            padding: 6px 0;
        }

        .input-wrapper button {
            background: none;
            border: none;
            color: #0095f6;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            padding-left: 10px;
        }

        /* SAĞ ÜYELER PANELİ */
        .members-section {
            flex: 1;
            min-width: 250px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .members-header {
            padding: 15px 20px;
            border-bottom: 1px solid #262626;
            font-size: 16px;
            font-weight: 600;
        }

        .members-list {
            padding: 15px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #333;
        }

        .member-info {
            display: flex;
            flex-direction: column;
        }

        .member-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .member-ig {
            font-size: 12px;
            color: #a8a8a8;
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginScreen">
        <h1>Instagram</h1>
        <input type="text" class="login-input" id="igUsernameInput" placeholder="Instagram Kullanıcı Adı (Örn: @kullanici)">
        <button class="login-btn" onclick="loginToChat()">Giriş Yap</button>
    </div>

    <div class="main-container" id="chatScreen">
        
        <div class="chat-section">
            <div class="chat-header">
                <h2>RowTeam 💬</h2>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message incoming">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Ahmet" class="msg-avatar">
                    <div class="msg-content">
                        <span class="username">@ahmet_arslan</span>
                        <div class="bubble">Selam beyler, site hayırlı olsun!</div>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz...">
                    <button onclick="sendMessage()">Gönder</button>
                </div>
            </div>
        </div>

        <div class="members-section">
            <div class="members-header">Üyeler</div>
            <div class="members-list" id="membersList">
                
                <div class="member-item">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Ahmet" class="member-avatar">
                    <div class="member-info">
                        <span class="member-name">Ahmet Arslan</span>
                        <span class="member-ig">@ahmet_arslan</span>
                    </div>
                </div>

                </div>
        </div>

    </div>

    <script>
        let currentUser = "@anonim";

        // Giriş Yapma Fonksiyonu
        function loginToChat() {
            let inputName = document.getElementById('igUsernameInput').value.trim();
            if (inputName !== "") {
                // Eğer başına @ koymadıysa biz ekleyelim
                if(!inputName.startsWith('@')) {
                    inputName = '@' + inputName;
                }
                currentUser = inputName;

                // Giriş ekranını gizle, chat ekranını aç
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'flex';
                document.title = "RowTeam | Chat";

                // Giriş yapan kişiyi sağdaki üye listesine ekle
                const membersList = document.getElementById('membersList');
                const userRow = document.createElement('div');
                userRow.className = 'member-item';
                userRow.innerHTML = `
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${currentUser}" class="member-avatar">
                    <div class="member-info">
                        <span class="member-name">Sen</span>
                        <span class="member-ig">${currentUser}</span>
                    </div>
                `;
                membersList.appendChild(userRow);
            } else {
                alert("Lütfen Instagram kullanıcı adınızı yazın!");
            }
        }

        // Mesaj Gönderme Fonksiyonu
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const messageText = input.value.trim();
            
            if (messageText !== "") {
                const chatMessages = document.getElementById('chatMessages');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message outgoing';
                
                messageDiv.innerHTML = `
                    <div class="msg-content">
                        <span class="username">${currentUser}</span>
                        <div class="bubble">${messageText}</div>
                    </div>
                `;
                
                chatMessages.appendChild(messageDiv);
                input.value = "";
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        // Enter ile gönderme tetikleyicisi
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { sendMessage(); }
        });
        document.getElementById('igUsernameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { loginToChat(); }
        });
    </script>
</body>
</html>
